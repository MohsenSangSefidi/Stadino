{% extends '_layout.html' %}

{% block title %}
    فراموشی رمز عبور
{% endblock %}

{% block content %}
    <!-- start content -->

    <div class="content">
        <div class="container-fluid">
            <div class="auth">
                <div class="auth-logo text-center my-4"><img src="/static/img/logo.png" width="180" alt=""></div>
                <div class="row justify-content-center">
                    <div class="col-lg-4">
                        <div class="content-box auth-front-forget-password">
                            <div class="container-fluid">

                                <div class="auth-action text-center">
                                    <a class="btn btn-lg bg-white shadow-md fw-bold font-18">فراموشی رمز عبور</a>
                                </div>

                                <div class="auth-form-forget-password mt-80 py-4">
                                    <form action="" method="post">
                                        {% csrf_token %}
                                        <div class="mb-4 form-avatar text-center">
                                            <img src="/static/img/user-avatar.svg" width="100" alt="">
                                        </div>
                                        <div class="comment-item mb-3">
                                            {{ form.email }}
                                            <div class="mt-3">{{ form.email.errors }}</div>

                                            <label for="floatingInputEmail" class="form-label label-float">ایمیل خود را وارد کنید</label>
                                        </div>
                                        <div class="form-group mb-0">
                                            <button type="submit" class="btn main-color-one-bg w-100 py-3">
                                                ارسال ایمیل
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- end content -->

    <br><br><br><br><br><br><br>

{% endblock %}
