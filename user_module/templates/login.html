{% extends '_layout.html' %}

{% block title %}
    صفحه ورود
{% endblock %}

{% block content %}

    <!-- start content -->

    <div class="content">
        <div class="container-fluid">
            <div class="auth">
                <div class="auth-logo text-center my-4"><img src="/static/img/logo.png" width="180" alt=""></div>
                <div class="row justify-content-center">
                    <div class="col-lg-4">
                        <div class="content-box auth-front">
                            <div class="container-fluid">
                                <div class="auth-action text-center">
                                    <a href="{% url 'login' %}" class="btn btn-lg bg-white shadow-md fw-bold font-18">ورود
                                        به سایت</a>
                                    <a href="{% url 'register' %}" class="btn btn-lg font-18 ms-2">عضویت در سایت</a>
                                </div>

                                <div class="auth-form mt-80 py-4">
                                    <form action="" method="post">
                                        {% csrf_token %}
                                        <div class="mb-4 form-avatar text-center">
                                            <img src="/static/img/user-avatar.svg" width="100" alt="">
                                        </div>

                                        <div class="comment-item mb-3">
                                            {{ form.email }}
                                            <div class="mt-3">{{ form.email.errors }}</div>
                                            <label for="floatingInputEmail" class="form-label label-float">ایمیل خود را وارد کنید</label>
                                        </div>

                                        <div class="comment-item mt-4 position-relative">
                                            {{ form.password }}
                                            <div class="mt-3">{{ form.password.errors }}</div>
                                            <label for="floatingInputPasswd" class="form-label label-float">رمز عبور خود را وارد کنید</label>
                                        </div>

                                        <div class="row align-items-center">
                                            <div class="col-6">
                                                <div class="form-check mb-3">
                                                    <div class="d-flex">
                                                        <a href="{% url 'forget-password' %}" class="text-info">فراموشی رمزعبور</a>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="form-group mb-0">
                                            <button type="submit" class="btn main-color-one-bg w-100 py-3">
                                                ورود به سایت
                                            </button>
                                        </div>
                                    </form>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- end content -->

    <br><br><br><br><br><br><br>
{% endblock %}
